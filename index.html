<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng Ký Suất Ăn Tuần</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{
  --red:#d63031;--red2:#b71c1c;--green:#27ae60;--green2:#1b5e20;
  --orange:#e67e22;--blue:#2980b9;--bg:#f0f2f5;
  --white:#fff;--text:#1a1a2e;--sub:#6c757d;
  --border:#dde1e7;--radius:14px;--shadow:0 4px 20px rgba(0,0,0,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;padding-bottom:40px;}

.hdr{background:linear-gradient(135deg,#d63031,#b71c1c);padding:20px 16px 50px;text-align:center;position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,0.06);width:220px;height:220px;top:-60px;right:-40px;}
.hdr::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,0.05);width:160px;height:160px;bottom:-80px;left:-30px;}
.hdr-icon{font-size:44px;animation:bob 2.5s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.hdr h1{color:#fff;font-size:21px;font-weight:900;margin-top:8px;}
.hdr p{color:rgba(255,255,255,0.75);font-size:13px;margin-top:4px;}

.week-bar{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:0 16px;margin-top:-22px;position:relative;z-index:2;margin-bottom:14px;}
.wchip{background:#fff;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;box-shadow:0 3px 12px rgba(0,0,0,0.1);}
.wchip.deadline{color:var(--red);}
.wchip.tuan{color:var(--blue);}

.wrap{max-width:520px;margin:0 auto;padding:0 14px;}

.card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:12px;animation:up .4s ease both;}
@keyframes up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.sec-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);margin-bottom:5px;}
.field input,.field select{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:'Nunito',sans-serif;font-weight:600;color:var(--text);background:var(--bg);transition:all .2s;outline:none;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(214,48,49,0.1);}
.field.err input,.field.err select{border-color:#e53935;background:#fff5f5;}
.sel-wrap{position:relative;}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--sub);pointer-events:none;}

/* TABS NGÀY */
.ngay-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.ngay-tabs::-webkit-scrollbar{display:none;}
.ngay-tab{flex-shrink:0;padding:8px 12px;border-radius:8px;border:2px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;background:#fff;color:var(--sub);text-align:center;min-width:48px;}
.ngay-tab:hover{border-color:#ccc;color:var(--text);}
.ngay-tab.active{border-color:var(--red);background:var(--red);color:#fff;}
.ngay-tab.done{border-color:var(--green);background:var(--green);color:#fff;}
.ngay-tab.nghi-tab{border-color:#bbb;background:#f5f5f5;color:#999;}

/* PROGRESS */
.prog-wrap{margin-bottom:14px;}
.prog-label{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px;}
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:3px;transition:width .4s;}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;margin-bottom:12px;border:2px solid;}
.toggle-row.nghi-style{background:#fff8f8;border-color:#ffcdd2;}
.toggle-row.ca-style-trua{background:#f1f8f1;border-color:#c8e6c9;}
.toggle-row.ca-style-chieu{background:#fff8f0;border-color:#ffe0b2;}
.toggle-lbl{font-size:13px;font-weight:800;}
.toggle-lbl.red{color:#c62828;}
.toggle-lbl.green{color:#2d7a3a;}
.toggle-lbl.orange{color:#e67e22;}
.tog{width:44px;height:24px;background:#ccc;border-radius:12px;cursor:pointer;transition:background .2s;position:relative;flex-shrink:0;}
.tog.on-red{background:#c62828;}
.tog.on-green{background:#27ae60;}
.tog.on-orange{background:#e67e22;}
.tog::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.tog.on-red::after,.tog.on-green::after,.tog.on-orange::after{left:22px;}

/* CHỌN MÓN MẶN */
.mon-section{padding:10px 12px;background:var(--bg);border-radius:9px;margin-top:8px;}
.mon-section-lbl{font-size:12px;font-weight:800;color:var(--text);margin-bottom:8px;}
.mon-grid{display:flex;flex-direction:column;gap:6px;}
.mon-item{border:2px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;background:#fff;}
.mon-item:hover{border-color:#bbb;transform:translateX(2px);}
.mon-item.sel-trua{border-color:var(--green);background:#edf7ef;}
.mon-item.sel-chieu{border-color:var(--orange);background:#fef5ec;}
.mon-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.mon-item.sel-trua .mon-dot{border-color:var(--green);background:var(--green);}
.mon-item.sel-chieu .mon-dot{border-color:var(--orange);background:var(--orange);}
.mon-dot::after{content:'';width:6px;height:6px;background:#fff;border-radius:50%;opacity:0;}
.mon-item.sel-trua .mon-dot::after,.mon-item.sel-chieu .mon-dot::after{opacity:1;}
.mon-ten{font-size:13px;font-weight:700;color:var(--text);}

/* MẶC ĐỊNH INFO */
.default-info{background:#fffbf0;border:1px solid #ffe082;border-radius:9px;padding:10px 12px;margin-top:8px;}
.default-info-title{font-size:11px;font-weight:800;color:#795548;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.default-item{font-size:12px;color:#6d4c41;display:flex;align-items:center;gap:6px;margin-bottom:3px;}

/* TỔNG KẾT */
.tongket{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:12px;}
.tk-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px;}
.tk-day{margin-bottom:8px;padding:10px;background:var(--bg);border-radius:9px;}
.tk-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.tk-name{font-size:13px;font-weight:800;color:var(--text);}
.tk-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;}
.badge-ok{background:#edf7ef;color:var(--green2);}
.badge-partial{background:#e3f2fd;color:#1565c0;}
.badge-none{background:#f5f5f5;color:#999;}
.badge-nghi{background:#ffebee;color:#c62828;}
.tk-detail{font-size:12px;color:var(--sub);line-height:1.7;}

/* BUTTONS */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.btn{padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-prev{background:var(--bg);border:2px solid var(--border);color:var(--sub);}
.btn-prev:hover:not(:disabled){border-color:#aaa;color:var(--text);}
.btn-prev:disabled{opacity:.35;}
.btn-next{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 4px 12px rgba(214,48,49,0.3);}
.btn-next:hover:not(:disabled){transform:translateY(-1px);}
.btn-next:disabled{opacity:.35;}
.btn-submit{width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;box-shadow:0 4px 16px rgba(39,174,96,0.35);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-submit:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(39,174,96,0.4);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg);}}

.result{display:none;border-radius:var(--radius);padding:22px;text-align:center;margin-bottom:12px;animation:up .3s ease;}
.result.ok{background:#edf7ef;border:2px solid var(--green);}
.result.err{background:#ffebee;border:2px solid #e53935;}
.result-icon{font-size:38px;margin-bottom:8px;}
.result-title{font-size:17px;font-weight:800;color:var(--text);margin-bottom:5px;}
.result-detail{font-size:13px;color:var(--sub);line-height:1.6;white-space:pre-line;}
.btn-reset{margin-top:12px;padding:8px 20px;border:2px solid var(--red);border-radius:8px;background:transparent;color:var(--red);font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;}
.btn-reset:hover{background:var(--red);color:#fff;}
.footer{text-align:center;padding:16px 0 0;color:var(--sub);font-size:12px;}
.chay-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#f1f8e9;border:2px solid #aed581;border-radius:10px;margin-bottom:12px;cursor:pointer;}
.chay-box{width:22px;height:22px;border:2px solid #7cb342;border-radius:5px;display:flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0;transition:all .2s;}
.chay-box.checked{background:#7cb342;border-color:#7cb342;}
.chay-box.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:900;}
.chay-lbl{font-size:13px;font-weight:800;color:#33691e;}
.chay-sub{font-size:11px;color:#689f38;margin-top:1px;}
.chay-badge{margin-left:auto;background:#7cb342;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
@media(max-width:380px){.frow{grid-template-columns:1fr;}.btn-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">🍱</div>
  <h1>Đăng Ký Suất Ăn Tuần</h1>
  <p>Chọn món mặn cho từng ca · Deadline: Thứ 6, 16:00</p>
</div>

<div class="week-bar">
  <div class="wchip tuan" id="chipTuan">📅 Đang tải...</div>
  <div class="wchip deadline" id="chipDeadline">⏰ ...</div>
</div>

<div class="wrap">

  <div class="result" id="result">
    <div class="result-icon" id="rIcon"></div>
    <div class="result-title" id="rTitle"></div>
    <div class="result-detail" id="rDetail"></div>
    <button class="btn-reset" onclick="location.reload()">🔄 Đăng ký lại</button>
  </div>

  <!-- THÔNG TIN NV -->
  <div class="card">
    <div class="sec-title">1 · Thông tin nhân viên</div>
    <div class="frow">
      <div class="field" id="fMaNV"><label>Mã nhân viên</label><input id="maNV" placeholder="VD: NV001" maxlength="20" autocomplete="off"/></div>
      <div class="field" id="fBoPhan"><label>Bộ phận</label>
        <div class="sel-wrap"><select id="boPhan">
          <option value="">-- Chọn --</option>
          <option>HCNS</option><option>Kế hoạch</option><option>IT</option>
          <option>Kế toán</option><option>Đóng gói</option><option>Mài</option>
          <option>Hoàn thiện</option><option>Tạo hình</option><option>Khác</option>
          <option>Gốm mộc</option><option>Gốm phối liệu</option><option>Khác</option>
          <option>Vật tư</option><option>Bảo Vệ</option><option>Khác</option>
          <option>QC</option><option>Tạp vụ</option><option>Khác</option>
          <option>Bảo trì</option><option>Kho TP</option><option>Khác</option>
          <option>Khuôn</option><option>Thí nghiệm</option><option>Khác</option>
          <option>Phụ trách Xưởng</option>
        </select></div>
      </div>
    </div>
    <div class="field" id="fHoTen"><label>Họ và tên</label><input id="hoTen" placeholder="Nhập họ và tên đầy đủ" maxlength="60" autocomplete="name"/></div>
  </div>

  <!-- ĐĂNG KÝ TỪNG NGÀY -->
  <div class="card">
    <div class="sec-title">2 · Chọn món mặn từng ngày</div>
    <div class="prog-wrap">
      <div class="prog-label"><span>Tiến độ</span><span id="progTxt">0/7 ngày</span></div>
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="ngay-tabs" id="ngayTabs"></div>
    <div id="ngayContent"></div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn btn-prev" id="btnPrev" onclick="chuyenNgay(-1)">← Trước</button>
      <button class="btn btn-next" id="btnNext" onclick="chuyenNgay(1)">Sau →</button>
    </div>
  </div>

  <!-- TỔNG KẾT -->
  <div class="tongket">
    <div class="tk-title">📋 Tổng kết cả tuần</div>
    <div id="tkList"></div>
  </div>

  <button class="btn-submit" id="btnSubmit" onclick="guiDangKy()">
    ✅ Xác Nhận Đăng Ký Cả Tuần
  </button>

  <div class="footer">Hệ thống đăng ký suất ăn · Nhà Ăn Công Ty</div>
</div>

<script>
const SHEET_URL = "https://nguyentannhanit.app.n8n.cloud/webhook/dang-ky-suat-an";

const THU_TEN   = ["Chủ Nhật","Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6","Thứ 7"];
const THU_SHORT = ["CN","T2","T3","T4","T5","T6","T7"];

// Menu mặc định (sẽ được ghi đè bởi dữ liệu từ Sheet)
let menuTuan = {};
const MENU_MAU = {
  trua: { man: ["Sườn chiên giòn","Gà kho gừng"], xao:"Rau muống xào tỏi", canh:"Canh chua cá" },
  chieu:{ man: ["Cá kho tộ","Thịt bò xào"],    xao:"Đậu que xào tỏi",  canh:"Canh rau ngót" }
};

let ngayIdx = 0;
let state   = {}; // { "yyyy-mm-dd": { nghi:bool, trua:{man,chon}, chieu:{man,chon} } }
let ngayArr = []; // 7 Date objects T2→CN tuần sau

// ================================================================
window.onload = () => {
  tinhTuanSau();
  renderTabs();
  renderContent();
  capNhatChip();
  taiMenu();
};

function tinhTuanSau() {
  const now = new Date();
  const thu = now.getDay();
  const diff = thu === 0 ? 1 : (8 - thu);
  const t2 = new Date(now);
  t2.setDate(now.getDate() + diff);
  t2.setHours(0,0,0,0);
  ngayArr = [];
  for (let i=0;i<7;i++) {
    const d = new Date(t2);
    d.setDate(t2.getDate()+i);
    ngayArr.push(d);
    const k = dk(d);
    if (!state[k]) state[k] = { nghi:false, chay:false, trua:{man:"",chon:false}, chieu:{man:"",chon:false} };
  }
}

function dk(d){ return d.toISOString().slice(0,10); }
function fmt(d){ return d.toLocaleDateString("vi-VN",{day:"2-digit",month:"2-digit"}); }

function capNhatChip() {
  document.getElementById("chipTuan").textContent = `📅 Tuần ${fmt(ngayArr[0])} → ${fmt(ngayArr[6])}`;
  const now = new Date();
  const t2  = ngayArr[0];
  // Deadline là T6 tuần hiện tại trước tuần đăng ký
  const thu6 = new Date(t2);
  thu6.setDate(t2.getDate()-3);
  thu6.setHours(16,0,0,0);
  const diff = Math.ceil((thu6-now)/(86400000));
  const chip = document.getElementById("chipDeadline");
  if (diff<0) chip.textContent="⛔ Hết hạn đăng ký";
  else if(diff===0) chip.textContent="⏰ Hôm nay là deadline!";
  else chip.textContent=`⏰ Còn ${diff} ngày`;
}

// ================================================================
function renderTabs() {
  document.getElementById("ngayTabs").innerHTML = ngayArr.map((d,i)=>{
    const s = state[dk(d)];
    let cls = i===ngayIdx?" active":"";
    if(s.nghi) cls=" nghi-tab";
    else if(s.trua.chon||s.chieu.chon) cls+=" done";
    return `<div class="ngay-tab${cls}" onclick="doiNgay(${i})">${THU_SHORT[d.getDay()]}<br><small>${fmt(d)}</small></div>`;
  }).join("");
  capNhatProgress();
}

function capNhatProgress() {
  const done = ngayArr.filter(d=>{ const s=state[dk(d)]; return s.nghi||s.trua.chon||s.chieu.chon; }).length;
  document.getElementById("progTxt").textContent = `${done}/7 ngày`;
  document.getElementById("progFill").style.width = `${(done/7)*100}%`;
  renderTongKet();
}

// ================================================================
function renderContent() {
  const d   = ngayArr[ngayIdx];
  const key = dk(d);
  const s   = state[key];
  const thu = d.getDay();
  const menu= menuTuan[key] || MENU_MAU;

  document.getElementById("ngayContent").innerHTML = `
    <!-- NGHỈ -->
    <div class="toggle-row nghi-style">
      <div class="toggle-lbl red">🏥 Nghỉ ngày ${THU_TEN[thu]} (${fmt(d)})</div>
      <div class="tog ${s.nghi?"on-red":""}" onclick="toggleNghi('${key}')"></div>
    </div>

    <!-- ĂN CHAY -->
    <div class="chay-row" id="chayRow" onclick="toggleChay('${key}')" style="display:${s.nghi?"none":"flex"}">
      <div class="chay-box ${s.chay?"checked":""}"></div>
      <div>
        <div class="chay-lbl">🌿 Ăn chay trường</div>
        <div class="chay-sub">Tất cả món sẽ là đồ chay</div>
      </div>
      ${s.chay?'<span class="chay-badge">Đang bật</span>':''}
    </div>

    <div id="caWrap" style="display:${s.nghi?"none":"block"}">
      <!-- CA TRƯA -->
      <div class="toggle-row ca-style-trua">
        <div class="toggle-lbl green">🌤 Ăn Ca Trưa?</div>
        <div class="tog ${s.trua.chon?"on-green":""}" onclick="toggleCa('${key}','trua')"></div>
      </div>
      <div id="truaWrap" style="display:${s.trua.chon?"block":"none"}">
        <div class="mon-section">
          <div class="mon-section-lbl">🥩 Chọn món mặn ca Trưa:</div>
          <div class="mon-grid">
            ${(menu.trua?.man||MENU_MAU.trua.man).map(m=>`
              <div class="mon-item ${s.trua.man===m?"sel-trua":""}" onclick="chonMon('${key}','trua','${esc(m)}')">
                <div class="mon-dot"></div>
                <div class="mon-ten">${m}</div>
              </div>`).join("")}
          </div>
          <div class="default-info" style="margin-top:10px;">
            <div class="default-info-title">🍽 Các món còn lại (mặc định)</div>
            <div class="default-item">🥬 Xào: ${menu.trua?.xao||MENU_MAU.trua.xao}</div>
            <div class="default-item">🍜 Canh: ${menu.trua?.canh||MENU_MAU.trua.canh}</div>
            <div class="default-item">🍊 Tráng miệng: Trái cây theo mùa</div>
          </div>
        </div>
      </div>

      <!-- CA CHIỀU -->
      <div class="toggle-row ca-style-chieu" style="margin-top:10px;">
        <div class="toggle-lbl orange">🌇 Ăn Ca Chiều?</div>
        <div class="tog ${s.chieu.chon?"on-orange":""}" onclick="toggleCa('${key}','chieu')"></div>
      </div>
      <div id="chieuWrap" style="display:${s.chieu.chon?"block":"none"}">
        <div class="mon-section">
          <div class="mon-section-lbl">🥩 Chọn món mặn ca Chiều:</div>
          <div class="mon-grid">
            ${(menu.chieu?.man||MENU_MAU.chieu.man).map(m=>`
              <div class="mon-item ${s.chieu.man===m?"sel-chieu":""}" onclick="chonMon('${key}','chieu','${esc(m)}')">
                <div class="mon-dot"></div>
                <div class="mon-ten">${m}</div>
              </div>`).join("")}
          </div>
          <div class="default-info" style="margin-top:10px;">
            <div class="default-info-title">🍽 Các món còn lại (mặc định)</div>
            <div class="default-item">🥬 Xào: ${menu.chieu?.xao||MENU_MAU.chieu.xao}</div>
            <div class="default-item">🍜 Canh: ${menu.chieu?.canh||MENU_MAU.chieu.canh}</div>
            <div class="default-item">🍊 Tráng miệng: Trái cây theo mùa</div>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById("btnPrev").disabled = ngayIdx===0;
  document.getElementById("btnNext").disabled = ngayIdx===6;
}

function esc(s){ return (s||"").replace(/'/g,"\'"); }

// ================================================================
function doiNgay(i){ ngayIdx=i; renderTabs(); renderContent(); }
function chuyenNgay(d){ const n=ngayIdx+d; if(n>=0&&n<7){ngayIdx=n;renderTabs();renderContent();} }

function toggleNghi(key){
  state[key].nghi=!state[key].nghi;
  if(state[key].nghi){ state[key].trua.chon=false; state[key].chieu.chon=false; }
  renderTabs(); renderContent();
}

function toggleCa(key,ca){
  state[key][ca].chon=!state[key][ca].chon;
  renderTabs(); renderContent();
}

function toggleChay(key){
  state[key].chay=!state[key].chay;
  // Nếu bật chay thì xoá món mặn đã chọn
  if(state[key].chay){
    state[key].trua.man="Suất chay";
    state[key].chieu.man="Suất chay";
  } else {
    state[key].trua.man="";
    state[key].chieu.man="";
  }
  renderTabs(); renderContent();
}

function chonMon(key,ca,ten){
  state[key][ca].man=ten;
  renderContent(); renderTabs();
}

// ================================================================
function renderTongKet(){
  document.getElementById("tkList").innerHTML = ngayArr.map(d=>{
    const key=dk(d); const s=state[key]; const thu=d.getDay();
    let badge,detail;
    if(s.nghi){
      badge=`<span class="tk-badge badge-nghi">Nghỉ</span>`;
      detail="Không ăn ngày này";
    } else if(!s.trua.chon&&!s.chieu.chon){
      badge=`<span class="tk-badge badge-none">Chưa chọn</span>`;
      detail="Chưa đăng ký ca nào";
    } else {
      const n = (s.trua.chon?1:0)+(s.chieu.chon?1:0);
      badge=`<span class="tk-badge ${n===2?"badge-ok":"badge-partial"}">${n===2?"Đủ 2 ca":"1 ca"}</span>`;
      let lines=[];
      const chayTag = s.chay?' 🌿':'';
      if(s.trua.chon) lines.push(`🌤 Trưa: ${s.chay?"Suất chay":(s.trua.man||"(chưa chọn món)")}${chayTag}`);
      if(s.chieu.chon) lines.push(`🌇 Chiều: ${s.chay?"Suất chay":(s.chieu.man||"(chưa chọn món)")}${chayTag}`);
      detail=lines.join("<br>");
    }
    return `<div class="tk-day">
      <div class="tk-header"><div class="tk-name">${THU_TEN[thu]} · ${fmt(d)}</div>${badge}</div>
      <div class="tk-detail">${detail}</div>
    </div>`;
  }).join("");
}

// ================================================================
function taiMenu(){
  if(!SHEET_URL||SHEET_URL==="https://nguyentannhanit.app.n8n.cloud/webhook/dang-ky-suat-an") return;
  const t2k = dk(ngayArr[0]);
  const s = document.createElement("script");
  s.src = SHEET_URL+"?action=getMenuTuan&t2="+t2k+"&callback=nhanMenu";
  s.onerror=()=>console.log("Dùng menu mẫu");
  document.body.appendChild(s);
}
function nhanMenu(data){
  if(data&&data.menu){ menuTuan=data.menu; renderContent(); }
}

// ================================================================
async function guiDangKy(){
  const maNV  = document.getElementById("maNV").value.trim();
  const hoTen = document.getElementById("hoTen").value.trim();
  const boPhan= document.getElementById("boPhan").value;
  let ok=true;
  ["fMaNV","fHoTen","fBoPhan"].forEach(id=>document.getElementById(id).classList.remove("err"));
  if(!maNV){document.getElementById("fMaNV").classList.add("err");ok=false;}
  if(!hoTen){document.getElementById("fHoTen").classList.add("err");ok=false;}
  if(!boPhan){document.getElementById("fBoPhan").classList.add("err");ok=false;}
  if(!ok){alert("⚠️ Vui lòng điền đầy đủ thông tin nhân viên!");return;}

  // Kiểm tra chọn món cho ca đã bật
  let thieu=[];
  ngayArr.forEach(d=>{
    const s=state[dk(d)]; const thu=THU_TEN[d.getDay()];
    if(!s.nghi){
      if(s.trua.chon&&!s.trua.man)  thieu.push(`${thu} - Ca Trưa`);
      if(s.chieu.chon&&!s.chieu.man) thieu.push(`${thu} - Ca Chiều`);
    }
  });
  if(thieu.length>0){alert("⚠️ Chưa chọn món mặn cho:\n"+thieu.join("\n"));return;}

  const coDK = ngayArr.some(d=>{const s=state[dk(d)];return s.nghi||s.trua.chon||s.chieu.chon;});
  if(!coDK){alert("⚠️ Vui lòng đăng ký ít nhất 1 ngày!");return;}

  const btn=document.getElementById("btnSubmit");
  btn.disabled=true;
  btn.innerHTML=`<span class="spin"></span> Đang gửi...`;

  const payload={
    action:"dangKyTuan",
    maNV:maNV.toUpperCase(),
    hoTen:chuanHoaTen(hoTen),
    boPhan,
    tuanBatDau:dk(ngayArr[0]),
    chiTiet:JSON.stringify(state),
    callback:"nhanKetQua"
  };

  const params=new URLSearchParams(payload);
  const script=document.createElement("script");
  script.id="req";
  script.src=SHEET_URL+"?"+params.toString();
  script.onerror=()=>{
    hienKQ(false,"Lỗi kết nối","Không thể gửi dữ liệu. Vui lòng thử lại.");
    btn.disabled=false; btn.innerHTML="✅ Xác Nhận Đăng Ký Cả Tuần";
  };
  const old=document.getElementById("req");
  if(old)old.remove();
  document.body.appendChild(script);
  setTimeout(()=>{
    if(btn.disabled){
      hienKQ(false,"Hết thời gian","Vui lòng thử lại.");
      btn.disabled=false; btn.innerHTML="✅ Xác Nhận Đăng Ký Cả Tuần";
    }
  },12000);
}

function nhanKetQua(data){
  const btn=document.getElementById("btnSubmit");
  btn.disabled=false; btn.innerHTML="✅ Xác Nhận Đăng Ký Cả Tuần";
  hienKQ(data.success,data.success?"Đăng ký thành công! 🎉":"Không thể đăng ký",data.message);
}

function hienKQ(ok,title,detail){
  const box=document.getElementById("result");
  box.className="result "+(ok?"ok":"err");
  box.style.display="block";
  document.getElementById("rIcon").textContent=ok?"✅":"❌";
  document.getElementById("rTitle").textContent=title;
  document.getElementById("rDetail").textContent=detail;
  box.scrollIntoView({behavior:"smooth",block:"start"});
}

function chuanHoaTen(ten){
  return ten.toLowerCase().trim().replace(/\b\w/g,c=>c.toUpperCase());
}
